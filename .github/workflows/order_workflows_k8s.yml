
name: deploy order

on:
  push:
    branches:
      - main  # github의 main branch에 push하면 workflow의 액션 감지 -> 파이프라인 동작

jobs:
  
  # job-name
  build-and-deploy:

    # runner
    runs-on: ubuntu-latest

    steps:
      - name: checkout github
        uses: actions/checkout@v2

      - name: install kubectl
        uses: azure/setup-kubectl@v3