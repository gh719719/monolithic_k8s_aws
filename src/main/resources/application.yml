# aws - ecr image
server:
    forward-headers-strategy: framework
    port: 8888

spring:

    # mariadb settings
    datasource:

        # ${} 외부변수 값은 k8s - secret 생성하여 pod 실행 시 주입할 예정
        driver-class-name:  org.mariadb.jdbc.Driver
        url:                jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&requireSSL=true} 
        username:           ${DB_ADMIN}
        password:           ${DB_PASSWORD}
    
    jpa:
        hibernate: 
            # create, create-drop, update, none
            ddl-auto:  create
            # 콘솔출력
        show-sql: true
        properties:
            hibernate:
                # h2
                # dialect: org.hibernate.dialect.H2Dialect
                # mariadb
                dialect: org.hibernate.dialect.MariaDBDialect
                format_sql: true
    
    # # redis
    # 도커, 이미지 생성 # docker run -d --name redis-container -p 6379:6379 redis:7.2
    # 도커 접속? # docker exec -it redis-container redis-cli
    # docker run -d --name redis-insight -p 8001:8001 redis/redisinsight:latest
    # Host: redis 또는 host.docker.internal , port: 6379

    data:
        redis:
            host: redis-service
            port: 6379
            password: 
            timeout: 6000ms
jwt:
    secret: jwt-secret-key-gh719719-1234567890



